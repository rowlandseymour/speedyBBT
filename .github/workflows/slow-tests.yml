name: run-slow-tests
on:
  # Allows manual trigger from the Actions tab
  workflow_dispatch: 
  # This runs at 00:00 UTC every Monday
  schedule:
    - cron: '0 0 * * 1'  

# no permissions are needed by the default github token for this workflow to 
# run, so don't pass any.  
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token  
permissions: {}

# Cancel runs happening simultaneously on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slow-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    env:
      RUN_SLOW_TESTS: "true"
      GITHUB_PAT: ${{ secrets.PAT }}

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
          needs: check

      - name: Run Slow Tests Only
        shell: Rscript {0}
        run: |
          # The filter looks for files with 'slow' in the name
          testthat::test_file("./tests/longtests/test-mcmc-long.R")
